version: "3.8"
services:
  waha:
    image: devlikeapro/waha:arm
    container_name: cockpit-waha
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - WHATSAPP_DEFAULT_ENGINE=WEBJS
      - WHATSAPP_RESTART_ALL_SESSIONS=True
      - WAHA_SESSION=default
      - WAHA_DASHBOARD_ENABLED=true
      - WAHA_DASHBOARD_USERNAME=admin
      - WAHA_DASHBOARD_PASSWORD=${WAHA_DASHBOARD_PASSWORD:-changeme}
      - WAHA_API_KEY=cockpitwaha2026devkey
    volumes:
      - waha_sessions:/app/.sessions
      - waha_data:/app/.media

  # Media server pour le streaming live tablette Field -> PC org -> VMS Qonify.
  # Architecture : 3 paths fixes (field-1/2/3) avec view tokens stables, tablette
  # publie via WHIP avec un publish_token jetable. Les hooks runOnPublish/Read/
  # Unpublish appellent /field/api/stream/auth pour valider et liberer les slots.
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: cockpit-mediamtx
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro

  # Routing engine pour le calcul d'itineraires Field + Cockpit (blueprint
  # routing.py). Tuiles construites a partir d'un PBF OSM clippe a la zone
  # circuit + 5 km : preparer le PBF avec scripts/build_valhalla_tiles.sh
  # puis demarrer ce service. Au premier lancement, gisops/valhalla detecte le
  # *.osm.pbf dans /custom_files et construit les tuiles automatiquement.
  # Bind 127.0.0.1 : service interne, jamais expose publiquement.
  valhalla:
    image: gisops/valhalla:latest
    container_name: cockpit-valhalla
    restart: unless-stopped
    ports:
      - "127.0.0.1:8002:8002"
    environment:
      - tile_urls=
      - server_threads=4
      - use_tiles_ignore_pbf=False
      - force_rebuild=False
      - update_existing_config=True
      - serve_tiles=True
    volumes:
      - ./valhalla/custom_files:/custom_files

volumes:
  waha_sessions:
  waha_data:
