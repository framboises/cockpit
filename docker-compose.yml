version: "3.8"
services:
  waha:
    image: devlikeapro/waha:arm
    container_name: cockpit-waha
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - WHATSAPP_DEFAULT_ENGINE=WEBJS
      - WHATSAPP_RESTART_ALL_SESSIONS=True
      - WAHA_SESSION=default
      - WAHA_DASHBOARD_ENABLED=true
      - WAHA_DASHBOARD_USERNAME=admin
      - WAHA_DASHBOARD_PASSWORD=${WAHA_DASHBOARD_PASSWORD:-changeme}
      - WAHA_API_KEY=cockpitwaha2026devkey
    volumes:
      - waha_sessions:/app/.sessions
      - waha_data:/app/.media

  valhalla:
    image: ghcr.io/gis-ops/docker-valhalla/valhalla:latest
    container_name: cockpit-valhalla
    restart: unless-stopped
    ports:
      - "8002:8002"
    volumes:
      - valhalla_data:/custom_files
    environment:
      - tile_urls=https://download.geofabrik.de/europe/france/pays-de-la-loire-latest.osm.pbf
      - server_threads=2
      - use_tiles_ignore_pbf=True
      - build_elevation=False
      - build_admins=False
      - build_time_zones=False
      - force_rebuild=False

volumes:
  waha_sessions:
  waha_data:
  valhalla_data:
