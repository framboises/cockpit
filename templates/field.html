<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Field">
  <title>COCKPIT Field</title>

  <link rel="manifest" href="/field/manifest.webmanifest">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/field.css') }}">
  <link rel="icon" href="/static/img/field-icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/static/img/field-icon.svg">
</head>
<body>
  <!-- BARRE SUPERIEURE -->
  <header class="field-topbar">
    <div class="topbar-left">
      <div class="logo">FIELD</div>
      <div class="device">
        <span class="device-name" id="field-device-name">{{ device.name or '-' }}</span>
        <span class="device-event">{{ device.event or '' }}{% if device.year %} / {{ device.year }}{% endif %}</span>
      </div>
    </div>
    <div class="topbar-right">
      <div class="status-pill" id="gps-status" title="GPS">
        <span class="material-symbols-outlined">location_searching</span>
        <span class="status-label">GPS</span>
      </div>
      <div class="status-pill" id="net-status" title="Reseau">
        <span class="material-symbols-outlined">signal_wifi_4_bar</span>
      </div>
      <div class="status-pill" id="battery-status" title="Batterie">
        <span class="material-symbols-outlined">battery_full</span>
        <span class="status-label" id="battery-pct">--</span>
      </div>
      <div class="clock" id="field-clock">--:--</div>
    </div>
  </header>

  <!-- CARTE -->
  <main class="field-map-wrap">
    <div id="field-map"></div>

    <!-- Bouton plein ecran (haut droite) -->
    <button class="map-fab map-fab-tr" id="btn-fullscreen" title="Plein ecran">
      <span class="material-symbols-outlined">fullscreen</span>
    </button>

    <!-- Outils de mesure (bas droite) -->
    <div class="map-measure-tools" id="measure-tools">
      <button class="tile-btn" id="measure-line" title="Mesurer une distance" data-mode="line">
        <span class="material-symbols-outlined">straighten</span>
      </button>
      <button class="tile-btn" id="measure-area" title="Mesurer une aire" data-mode="area">
        <span class="material-symbols-outlined">square_foot</span>
      </button>
      <button class="tile-btn" id="measure-circle" title="Rayon / Diametre" data-mode="circle">
        <span class="material-symbols-outlined">radio_button_unchecked</span>
      </button>
      <button class="tile-btn" id="measure-clear" title="Effacer" data-mode="clear">
        <span class="material-symbols-outlined">delete_outline</span>
      </button>
    </div>

    <!-- Crosshair grille (cellule courante) -->
    <div class="grid-crosshair" id="grid-crosshair" hidden>
      <div class="gx-line gx-line-v"></div>
      <div class="gx-line gx-line-h"></div>
      <div class="gx-label" id="grid-crosshair-label">-</div>
    </div>

    <!-- Panneau latéral (inbox) -->
    <aside class="inbox-panel" id="inbox-panel" hidden>
      <div class="inbox-header">
        <h2>Messages</h2>
        <button class="icon-btn" id="inbox-close" title="Fermer">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div class="inbox-list" id="inbox-list">
        <div class="inbox-empty">Aucun message.</div>
      </div>
    </aside>

    <!-- Panneau Calques -->
    <aside class="layers-panel" id="layers-panel" hidden>
      <div class="layers-header">
        <h2>Calques</h2>
        <button class="icon-btn" id="layers-close" title="Fermer">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div class="layers-list" id="layers-list">
        <div class="layers-section-title">Carroyage</div>
        <label class="layer-row">
          <input type="checkbox" id="lyr-grid-100" />
          <span class="layer-name"><span class="material-symbols-outlined">grid_3x3</span> Carroyage 100m</span>
        </label>
        <label class="layer-row" id="lyr-grid-25-row" hidden>
          <input type="checkbox" id="lyr-grid-25" />
          <span class="layer-name"><span class="material-symbols-outlined">grid_4x4</span> Sous-grille 25m</span>
        </label>
        <div class="layers-section-title">Infrastructures</div>
        <label class="layer-row">
          <input type="checkbox" id="lyr-3p" />
          <span class="layer-name"><span class="material-symbols-outlined">door_front</span> Portes / Portails</span>
        </label>
        <div class="layers-section-title">POI evenement</div>
        <div id="lyr-poi-list">
          <div class="layers-empty">Chargement&hellip;</div>
        </div>
      </div>
    </aside>
  </main>

  <!-- BARRE D'ACTIONS -->
  <nav class="field-actions">
    <button class="action-btn" id="btn-recenter" title="Me recentrer">
      <span class="material-symbols-outlined">my_location</span>
      <span class="label">Moi</span>
    </button>
    <button class="action-btn" id="btn-layers" title="Fond de carte">
      <span class="material-symbols-outlined">map</span>
      <span class="label">Fond</span>
    </button>
    <button class="action-btn" id="btn-grid" title="Calques">
      <span class="material-symbols-outlined">layers</span>
      <span class="label">Calques</span>
    </button>
    <button class="action-btn" id="btn-inbox" title="Messages">
      <span class="material-symbols-outlined">inbox</span>
      <span class="badge" id="inbox-badge" hidden>0</span>
      <span class="label">Messages</span>
    </button>
    <button class="action-btn action-sos" id="btn-sos" title="SOS">
      <span class="material-symbols-outlined">emergency</span>
      <span class="label">SOS</span>
    </button>
  </nav>

  <!-- Modal message -->
  <div class="field-modal" id="msg-modal" hidden>
    <div class="field-modal-box">
      <div class="field-modal-header">
        <h2 id="msg-modal-title">Message</h2>
        <button class="icon-btn" id="msg-modal-close" title="Fermer">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div class="field-modal-body" id="msg-modal-body">-</div>
      <div class="field-modal-actions">
        <button class="btn-primary" id="msg-modal-route" hidden>
          <span class="material-symbols-outlined" style="vertical-align:middle;">navigation</span>
          Demarrer l'itineraire
        </button>
        <button class="btn-primary" id="msg-modal-ack">J'ai compris</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="field-toast" id="field-toast" hidden></div>

  <!-- Données serveur -->
  <script>
    window.FIELD_DEVICE = {{ device | tojson }};
  </script>
  <!-- Material Symbols -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined">
  <!-- Leaflet -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Turf.js (calcul d aire pour outils mesure) -->
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
  <!-- Field app -->
  <script src="{{ url_for('static', filename='js/field.js') }}"></script>
</body>
</html>
